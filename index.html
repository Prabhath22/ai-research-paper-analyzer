<!DOCTYPE html>
<html>
<head>
<title>AI Research Paper Analyzer</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div class="bg-gray-800 p-10 rounded-2xl shadow-xl w-96 text-center">

<h1 class="text-2xl font-bold mb-4">
AI Research Paper Analyzer
</h1>

<p class="text-gray-400 mb-6">
Upload a research paper PDF and get an AI summary instantly.
</p>

<input
type="file"
id="fileInput"
accept=".pdf"
class="mb-4 block w-full text-sm text-gray-300
file:mr-4 file:py-2 file:px-4
file:rounded file:border-0
file:bg-blue-600 file:text-white
hover:file:bg-blue-700"
/>

<button
onclick="uploadPDF()"
class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-lg w-full"
>
Analyze Paper
</button>

<p id="status" class="mt-4 text-gray-400"></p>

</div>

<script>

async function uploadPDF(){

const file=document.getElementById("fileInput").files[0];

if(!file){
alert("Upload a PDF");
return;
}

document.getElementById("status").innerText="Analyzing paper...";

const formData=new FormData();
formData.append("data",file);

const response=await fetch(
"https://prabhath.app.n8n.cloud/webhook/f54a415c-0596-4f2c-80b2-874614795f11",
{
method:"POST",
body:formData
}
);

const blob=await response.blob();

const url=window.URL.createObjectURL(blob);

const a=document.createElement("a");
a.href=url;
a.download="analysis.txt";
a.click();

document.getElementById("status").innerText="Download ready!";

}

</script>

</body>
</html>
