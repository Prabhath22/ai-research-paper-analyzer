<!DOCTYPE html>
<html>
<head>
<title>AI Research Paper Analyzer</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gradient-to-r from-yellow-100 to-orange-200 min-h-screen flex items-center justify-center font-sans">

<div class="bg-white p-10 rounded-2xl shadow-xl w-[500px] text-center">

<h1 class="text-3xl font-bold text-orange-600 mb-2">
AI Research Paper Analyzer
</h1>

<p class="text-gray-600 mb-6">
Upload a research paper PDF and get an AI-generated summary instantly.
</p>

<div id="dropArea"
class="border-2 border-dashed border-gray-400 rounded-lg p-6 mb-4 cursor-pointer hover:border-orange-500 transition">

<p id="uploadText" class="text-gray-600">
Drag & Drop PDF here or Click to Upload
</p>

<input type="file" id="fileInput" accept=".pdf" class="hidden">

</div>

<button onclick="uploadPDF()"
class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 rounded-lg w-full font-semibold">

Analyze Paper

</button>

<p id="status" class="mt-4 text-gray-700"></p>

<div class="mt-6 text-sm text-gray-600">

<p class="mb-2 font-semibold text-orange-600">
Note:
</p>

<ul class="text-left list-disc list-inside">
<li>PDFs under <b>10 pages</b> give better results.</li>
<li>Large PDFs may take longer to process.</li>
</ul>

</div>

</div>

<script>

const dropArea = document.getElementById("dropArea")
const fileInput = document.getElementById("fileInput")
const status = document.getElementById("status")
const uploadText = document.getElementById("uploadText")

let uploadedFile = null

dropArea.addEventListener("click", () => fileInput.click())

fileInput.addEventListener("change", () => {
uploadedFile = fileInput.files[0]
uploadText.innerHTML = "Selected File: <b>" + uploadedFile.name + "</b>"
})

dropArea.addEventListener("dragover", (e) => {
e.preventDefault()
dropArea.classList.add("border-orange-500")
})

dropArea.addEventListener("dragleave", () => {
dropArea.classList.remove("border-orange-500")
})

dropArea.addEventListener("drop", (e) => {
e.preventDefault()

uploadedFile = e.dataTransfer.files[0]

uploadText.innerHTML = "Selected File: <b>" + uploadedFile.name + "</b>"
})

async function uploadPDF(){

if(!uploadedFile){
alert("Please upload a PDF file")
return
}

status.innerText = "Analyzing research paper..."

const formData = new FormData()
formData.append("data", uploadedFile)

const response = await fetch(
"https://prabhath.app.n8n.cloud/webhook/f54a415c-0596-4f2c-80b2-874614795f11",
{
method: "POST",
body: formData
}
)

const blob = await response.blob()

const url = window.URL.createObjectURL(blob)

const a = document.createElement("a")
a.href = url
a.download = "research-analysis.html"
a.click()

status.innerText = "Analysis complete. Download started."

}

</script>

</body>
</html>
